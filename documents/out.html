<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LuxeCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7C3AED',
                        'primary-dark': '#5B21B6',
                        dark: '#0F0F0F',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #7C3AED, #A78BFA, #C4B5FD); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-admin { background: linear-gradient(135deg, #7C3AED, #5B21B6); transition: all 0.3s; }
        .btn-admin:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.4); }
        input:focus { box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl p-10 shadow-2xl shadow-black/5 border border-gray-100">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center mx-auto mb-5 shadow-xl shadow-primary/20">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="text-2xl font-black mb-1">Admin Portal</h1>
                <p class="text-gray-500 text-sm">Sign in to manage your store</p>
            </div>

            <!-- Flash Messages -->
            
            
            

            <form method="POST" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="font-bold text-xs uppercase tracking-widest text-gray-400">Username</label>
                    <input type="text" name="username" required placeholder="Enter admin username" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:border-primary text-sm transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="font-bold text-xs uppercase tracking-widest text-gray-400">Password</label>
                    <input type="password" name="password" required placeholder="Enter admin password" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:border-primary text-sm transition-all">
                </div>
                <button type="submit" class="w-full btn-admin text-white py-4 rounded-2xl font-bold text-base shadow-lg mt-2">
                    Sign In to Admin
                </button>
            </form>

            <p class="text-center mt-8 text-gray-400 text-xs">
                <a href="/" class="hover:text-primary transition-colors">← Back to Store</a>
            </p>
        </div>
    </div>
</body>
</html>
