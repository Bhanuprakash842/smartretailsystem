{% extends "layout.html" %}
{% block title %}Sign In - LuxeCart{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-20">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl p-10 shadow-xl shadow-black/5 border border-gray-100">
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center mx-auto mb-5 shadow-lg shadow-primary/20">
                    <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="text-2xl font-black mb-1">Welcome Back</h1>
                <p class="text-muted text-sm">Sign in to your LuxeCart account</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="font-bold text-xs uppercase tracking-widest text-muted">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:border-primary text-sm transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="font-bold text-xs uppercase tracking-widest text-muted">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:border-primary text-sm transition-all">
                </div>

                <div id="error-msg" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-xl font-medium"></div>

                <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold text-base shadow-lg mt-2" id="login-btn">
                    <span>Sign In</span>
                </button>
            </form>

            <p class="text-center mt-8 text-muted text-sm">
                Don't have an account? <a href="/register" class="text-primary font-bold hover:underline">Register</a>
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const errorDiv = document.getElementById('error-msg');
        errorDiv.classList.add('hidden');

        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>Signing in...</span></span>';
        btn.disabled = true;

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });

            const data = await resp.json();
            if(resp.ok) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('username', username);
                window.location.href = '/';
            } else {
                errorDiv.textContent = data.error || 'Login failed';
                errorDiv.classList.remove('hidden');
                btn.innerHTML = '<span>Sign In</span>';
                btn.disabled = false;
            }
        } catch(err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.classList.remove('hidden');
            btn.innerHTML = '<span>Sign In</span>';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
